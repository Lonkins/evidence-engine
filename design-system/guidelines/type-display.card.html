<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: var(--space-4) var(--space-5); }
  .eyebrow { margin-bottom: var(--space-2); }
  h1 { font-family: var(--font-display); font-weight: 900; font-size: 2.6rem; color: var(--text); letter-spacing: var(--tracking-display); line-height: 1.02; }
  h1 em { font-weight: 500; font-style: italic; color: var(--accent-bright); }
  .test { margin-top: var(--space-3); font-family: var(--font-display); font-style: italic; font-size: var(--text-md); color: var(--text-dim); max-width: 56ch; line-height: 1.6; }
  .stk { margin-top: var(--space-2); }
</style></head>
<body>
  <p class="eyebrow">Display · Playfair Display</p>
  <h1>Put an AI <em>on the stand</em></h1>
  <p class="test">“It was an ordinary evening, Inspector, until it wasn't.”</p>
  <p class="meta stk">400 · 500 italic · 700 · 900 — headlines, narrator voice, testimony</p>
</body></html>
