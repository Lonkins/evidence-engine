<!-- @dsCard group="Type" viewport="700x190" name="Stencil — Oswald" subtitle="Stamps, classified labels, case numbers — the wartime case-file voice" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: var(--space-4) var(--space-5); }
  .big { font-family: var(--font-stencil); font-weight: 600; font-size: 2.2rem; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--text); }
  .labels { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-3); }
  .tag { font-family: var(--font-stencil); font-weight: 500; font-size: var(--text-xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; padding: .35em .7em; border: 1px solid var(--line-strong); border-radius: var(--radius-xs); color: var(--accent); }
  .tag--c { color: var(--oxblood-500); border-color: var(--oxblood-700); }
  .stk { margin-top: var(--space-3); }
</style></head>
<body>
  <div class="big">Case No. 14 · Confidential</div>
  <div class="labels">
    <span class="tag">Exhibit A</span>
    <span class="tag">Witness Statement</span>
    <span class="tag tag--c">Contradicted</span>
    <span class="tag">Foundry IQ</span>
  </div>
  <p class="meta stk">300 – 700 — eyebrows, stamps, classification chips, navigation labels</p>
</body></html>
