<!-- @dsCard group="Brand" viewport="700x210" name="Motif · paper & the verdict stamp" subtitle="Aged stock + newsprint halftone; the inked, jittered verdict impression" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: var(--space-4) var(--space-5); display:flex; gap: var(--space-4); align-items:center; }
  .slip {
    flex: 1; background: var(--halftone), var(--paper-stock); background-size: var(--halftone-size), auto;
    color: var(--bone-ink); border-radius: var(--radius-xs); padding: var(--space-3) var(--space-4);
    box-shadow: var(--shadow-stamped); transform: rotate(-0.5deg);
  }
  .slip .doc { font-family: var(--font-stencil); font-weight: 600; font-size: var(--text-xs); letter-spacing: var(--tracking-wider); text-transform: uppercase; }
  .slip blockquote { margin: 8px 0 0; padding-left: var(--space-2); border-left: 2px solid var(--bone-400); font-family: var(--font-type); font-size: var(--text-sm); color: var(--bone-ink-deep); }
  .stamp {
    flex: 0 0 auto; font-family: var(--font-stencil); font-weight: 700; font-size: 1.5rem;
    letter-spacing: var(--tracking-stamp); text-transform: uppercase; color: var(--oxblood-500);
    border: var(--border-stamp) solid var(--oxblood-500); border-radius: var(--radius-xs);
    padding: .3em .6em; transform: rotate(-7deg); opacity: .92;
    box-shadow: inset 0 0 0 1px rgba(126,29,31,.4);
  }
</style></head>
<body>
  <div class="slip">
    <div class="doc">● Electronic Access Log</div>
    <blockquote>20:47:33 | CARD_EXIT | HOLDER: Helena Voss (HV-0041)</blockquote>
  </div>
  <div class="stamp">Contradicted</div>
</body></html>
