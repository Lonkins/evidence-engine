<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="A tight, deliberate rhythm" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); padding: var(--space-4) var(--space-5); }
  .row { display: flex; align-items: flex-end; gap: var(--space-3); }
  .c { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .bar { width: 28px; background: linear-gradient(180deg, var(--brass-300), var(--brass-700)); border-radius: var(--radius-xs); }
</style></head>
<body>
  <div class="row">
    <div class="c"><div class="bar" style="height:var(--space-1)"></div><span class="meta">1</span></div>
    <div class="c"><div class="bar" style="height:var(--space-2)"></div><span class="meta">2</span></div>
    <div class="c"><div class="bar" style="height:var(--space-3)"></div><span class="meta">3</span></div>
    <div class="c"><div class="bar" style="height:var(--space-4)"></div><span class="meta">4</span></div>
    <div class="c"><div class="bar" style="height:var(--space-5)"></div><span class="meta">5</span></div>
    <div class="c"><div class="bar" style="height:var(--space-6)"></div><span class="meta">6</span></div>
  </div>
</body></html>
