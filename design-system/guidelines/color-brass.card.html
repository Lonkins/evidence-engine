<!-- @dsCard group="Colors" viewport="700x150" name="Brass — the lamp & the engine" subtitle="The single hero accent: lamp-gold, used with restraint" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--bg); }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 0; padding: var(--space-4); }
  .sw { height: 92px; display: flex; flex-direction: column; justify-content: flex-end; padding: var(--space-2); gap: 2px; }
  .sw b { font-family: var(--font-type); font-size: var(--text-2xs); color: var(--ink-900); letter-spacing: .04em; }
  .sw span { font-family: var(--font-type); font-size: var(--text-2xs); color: rgba(10,8,6,.6); }
  .sw--dark b { color: var(--brass-300); } .sw--dark span { color: var(--brass-700); }
</style></head>
<body>
  <div class="row">
    <div class="sw sw--dark" style="background:var(--brass-900)"><b>brass-900</b><span>#6b4f24</span></div>
    <div class="sw sw--dark" style="background:var(--brass-700)"><b>brass-700</b><span>#8a6a2f</span></div>
    <div class="sw" style="background:var(--brass-500)"><b>brass-500</b><span>#c9a14a</span></div>
    <div class="sw" style="background:var(--brass-300)"><b>brass-300</b><span>#e8c97e</span></div>
    <div class="sw" style="background:var(--brass-100)"><b>brass-100</b><span>#f6e6bd</span></div>
  </div>
</body></html>
